<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Zero-Token 启动中...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #0f172a; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .container { text-align: center; }
  .spinner {
    width: 48px; height: 48px; margin: 0 auto 24px;
    border: 4px solid #334155; border-top-color: #38bdf8;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 24px; margin-bottom: 8px; color: #f1f5f9; }
  p { font-size: 14px; color: #94a3b8; }
  .dot { animation: blink 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }
</style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h1>Zero-Token 正在启动</h1>
  <p>等待网关就绪<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
</div>
<script>
const url = 'http://127.0.0.1:18789/';
let attempts = 0;
const maxAttempts = 120; // 2 minutes max

function check() {
  if (attempts++ > maxAttempts) {
    document.querySelector('p').textContent = '启动超时，请检查网关日志';
    return;
  }
  fetch(url, { mode: 'no-cors' })
    .then(() => { window.location.replace(url); })
    .catch(() => { setTimeout(check, 1000); });
}

setTimeout(check, 500);
</script>
</body>
</html>
